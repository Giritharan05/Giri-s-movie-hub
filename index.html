<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giri's MovieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold text-warning" href="#" onclick="showSection('home')">Giri's MovieHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('home')">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('popular')">Popular</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('search')">Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('favorites')">Favorites</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
    <section id="home" class="section active">
        <div class="hero-section position-relative rounded-4 overflow-hidden mb-5 shadow-lg">
            <div class="hero-overlay p-4 p-md-5 d-flex flex-column justify-content-end">
                <span class="badge bg-warning text-dark mb-2 w-fit">Featured Movie</span>
                <h1 class="display-4 fw-bold text-white mb-2" id="hero-title">LEO</h1>
                <p class="lead text-light mb-4" id="hero-plot">A mild-mannered cafe owner becomes a local hero, but his past
                    soon catches up with him.</p>
                <div class="d-flex gap-2">
                    <button class="btn btn-warning fw-bold px-4" onclick="showMovieDetails('tt15654328')">Details</button>
                    <button class="btn btn-outline-light px-4" onclick="showSection('popular')">Explore More</button>
                </div>
            </div>
            <img src="https://www.livemint.com/lm-img/img/2023/11/13/1600x900/leo_1695203139927_1699847512492.jpg" alt="Leo Poster" class="hero-img w-100" id="hero-image">
        </div>
    
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card p-4 rounded-4 bg-black border border-secondary text-center">
                    <h2 class="text-warning mb-1" id="stat-fav-count">0</h2>
                    <p class="mb-0">Movies in Favorites</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card p-4 rounded-4 bg-black border border-secondary text-center">
                    <h2 class="text-warning mb-1">2025</h2>
                    <p class="mb-0">Current Cinema Year</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card p-4 rounded-4 bg-black border border-secondary text-center">
                    <h2 class="text-warning mb-1">4+</h2>
                    <p class="mb-0">Regional Industries</p>
                </div>
            </div>
        </div>
    </section>

        <section id="search" class="section">
            <div class="row justify-content-center mb-4">
                <div class="col-lg-10">
                    <div class="input-group">
                        <input type="text" id="movie-name" class="form-control bg-dark text-white border-secondary"
                            placeholder="Search Tamil/Indian movies...">
                        
                        <button id="search-button" class="btn btn-warning">Search</button>
                    </div>
                </div>
            </div>
            <div class="row" id="search-results"></div>
        </section>

        <section id="popular" class="section">
            <h2 class="mb-4 text-warning"> Most Popular</h2>
            <div class="row" id="popular-list"></div>
        </section>

        <section id="favorites" class="section">
            <h2 class="mb-4 text-warning"> My Favorites</h2>
            <div class="row" id="favorites-list"></div>
        </section>
    </div>

    <div class="modal fade" id="movieModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-light border-warning">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modal-title"></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body-content"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
